name: Wolf Nutrition CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    name: Code Quality & Linting (CI)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: pdo, pdo_mysql, mysqli, mbstring, json, xml

    - name: Syntax Check (Lint PHP)
      run: |
        find . -name "*.php" ! -path "./vendor/*" ! -path "./.gemini/*" -type f -print0 | xargs -0 -n 1 -P 4 php -l
